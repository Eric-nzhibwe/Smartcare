<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCare EMR — Zambia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6Q==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--surface:#ffffff;--surface2:#f7f9fc;
  --border:#e2e8f0;--border2:#cbd5e1;
  --primary:#0f4c81;--primary-light:#1a69b3;--primary-ghost:#e8f0fb;
  --accent:#00a878;--accent-light:#e6f7f3;
  --danger:#dc2626;--danger-light:#fef2f2;
  --warn:#d97706;--warn-light:#fffbeb;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* -- login -- */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f4c81 0%,#1a69b3 50%,#00a878 100%)}
.login-card{background:white;border-radius:16px;padding:40px 44px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:22px;font-weight:600;color:var(--primary);letter-spacing:-.3px}
.login-logo p{font-size:12px;color:var(--text3);margin-top:2px}
.login-logo .cross{font-size:36px;margin-bottom:8px}
.demo-accounts{background:#f8fafc;border-radius:8px;padding:12px 14px;margin-bottom:20px;font-size:12px;color:var(--text2)}
.demo-accounts strong{display:block;margin-bottom:6px;color:var(--text);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.demo-row{display:flex;gap:8px;flex-wrap:wrap}
.demo-chip{background:white;border:1px solid var(--border2);border-radius:20px;padding:3px 10px;cursor:pointer;transition:all .15s;font-size:11px}
.demo-chip:hover{background:var(--primary);color:white;border-color:var(--primary)}

/* -- layout -- */
#app{display:none;height:100vh;flex-direction:row}
.sidebar{width:220px;background:var(--primary);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo h1{font-size:16px;font-weight:600;color:white;letter-spacing:-.2px}
.sidebar-logo p{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.sidebar-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:white;flex-shrink:0}
.user-info p{font-size:12px;font-weight:500;color:white;line-height:1.3}
.user-info span{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.4px}
nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;color:rgba(255,255,255,.65);font-size:13px;font-weight:400;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{color:white;background:rgba(255,255,255,.07)}
.nav-item.active{color:white;background:rgba(255,255,255,.13);border-left-color:var(--accent);font-weight:500}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.8}
.nav-item.active svg{opacity:1}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1)}
.logout-btn{width:100%;padding:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:var(--radius-sm);color:rgba(255,255,255,.7);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.logout-btn:hover{background:rgba(255,255,255,.15);color:white}

/* -- main -- */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:white;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-.2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.page{flex:1;overflow-y:auto;padding:24px}

/* -- cards / stats -- */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:white;border-radius:var(--radius);padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow)}
.stat-card .label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-card .value{font-size:26px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.5px}
.stat-card .sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat-card.accent{border-left:3px solid var(--accent)}
.stat-card.primary{border-left:3px solid var(--primary)}
.stat-card.warn{border-left:3px solid var(--warn)}
.stat-card.danger{border-left:3px solid var(--danger)}

.card{background:white;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:14px;font-weight:600;color:var(--text)}
.card-body{padding:16px 20px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* -- table -- */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.patient-name{font-weight:500;color:var(--text)}

/* -- badges -- */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-green{background:var(--accent-light);color:#065f46}
.badge-blue{background:var(--primary-ghost);color:var(--primary)}
.badge-warn{background:var(--warn-light);color:#92400e}
.badge-red{background:var(--danger-light);color:var(--danger)}
.badge-gray{background:#f1f5f9;color:var(--text3)}

/* -- forms -- */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.form-grid.cols-1{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field.span-2{grid-column:span 2}
label{font-size:12px;font-weight:500;color:var(--text2);letter-spacing:.1px}
input,select,textarea{padding:8px 11px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;color:var(--text);background:white;transition:border-color .15s,box-shadow .15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(26,105,179,.1)}
textarea{resize:vertical;min-height:70px}
.section-divider{grid-column:1/-1;padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px}
.section-divider h4{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}

/* -- buttons -- */
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:var(--primary-light)}
.btn-accent{background:var(--accent);color:white}
.btn-accent:hover{background:#00956a}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-outline:hover{background:var(--surface2);border-color:var(--border2)}
.btn-ghost{background:transparent;color:var(--primary);border:none;padding:6px 10px;font-size:12px}
.btn-ghost:hover{background:var(--primary-ghost)}
.btn-danger{background:var(--danger);color:white}
.btn-sm{padding:5px 11px;font-size:12px}

/* -- search bar -- */
.search-bar{display:flex;align-items:center;gap:10px;background:white;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 12px;flex:1;max-width:380px}
.search-bar input{border:none;outline:none;font-size:13px;flex:1;background:transparent;color:var(--text)}
.search-bar i,.search-bar svg{color:var(--text3);flex-shrink:0;font-size:13px}
.nav-section{padding:14px 18px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.3)}

/* ── quick search (doctor) ── */
#qs-input:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(26,105,179,.1)}
.qsr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.qsr-item:last-child{border-bottom:none}
.qsr-item:hover{background:var(--bg)}
.qsr-avatar{width:30px;height:30px;border-radius:50%;background:var(--primary-ghost);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.qsr-body{flex:1;min-width:0}
.qsr-name{font-size:13px;font-weight:500;color:var(--text)}
.qsr-meta{font-size:11px;color:var(--text3);margin-top:2px}

/* ── risk / complexity (doctor) ── */
.risk-high{background:#fef2f2;border-left:3px solid var(--danger)}
.risk-med{background:#fffbeb;border-left:3px solid var(--warn)}
.risk-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
.risk-badge.high{background:var(--danger-light);color:var(--danger)}
.risk-badge.med{background:var(--warn-light);color:#92400e}
.risk-badge.low{background:var(--accent-light);color:#065f46}
.complexity-dots{display:flex;gap:3px;align-items:center}
.cdot{width:8px;height:8px;border-radius:50%;background:var(--border2)}
.cdot.danger{background:var(--danger)}
.cdot.warn{background:var(--warn)}
.cdot.accent{background:var(--accent)}

/* ── diagnosis sparkline (doctor) ── */
.diag-trend-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.diag-trend-row:last-child{border-bottom:none}
.diag-name{font-size:12px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sparkline{display:flex;align-items:flex-end;gap:2px;height:24px;flex-shrink:0}
.spark-bar{width:6px;border-radius:2px 2px 0 0;background:var(--primary);opacity:.6}
.spark-bar.peak{opacity:1;background:var(--accent)}
.diag-cnt{font-size:12px;font-weight:600;color:var(--text);width:28px;text-align:right;flex-shrink:0}
.diag-trend-arrow{font-size:11px;flex-shrink:0;width:20px;text-align:center}

/* ── activity feed (doctor) ── */
.activity-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px}
.ai-encounter{background:var(--primary-ghost);color:var(--primary)}
.ai-vitals{background:var(--accent-light);color:var(--accent)}
.ai-followup{background:var(--warn-light);color:var(--warn)}
.ai-register{background:#f3f0ff;color:#6d28d9}

/* ── triage mode (nurse) ── */
.triage-mode-bar{display:none;align-items:center;justify-content:space-between;gap:12px;background:var(--primary);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;flex-wrap:wrap}
.triage-mode-bar.active{display:flex}
.tm-info{color:#fff}
.tm-info h4{font-size:14px;font-weight:600}
.tm-info p{font-size:12px;opacity:.75;margin-top:2px}
.tm-actions{display:flex;gap:8px;flex-wrap:wrap}
.progress-bar{height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;margin-top:6px;min-width:120px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.vitals-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;padding:14px 18px;border-top:1px solid var(--border)}
.vs-field{display:flex;flex-direction:column;gap:4px}
.vs-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text3)}
.vs-input{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;outline:none;width:100%;transition:border-color .15s,box-shadow .15s}
.vs-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,168,120,.1)}
@keyframes pulse-anim{0%,100%{opacity:1}50%{opacity:.7}}
.critical-label{display:inline-flex;align-items:center;gap:4px;background:var(--danger);color:#fff;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;animation:pulse-anim 2s infinite}
.critical-row{background:#fff5f5 !important}
.critical-row td{border-bottom:1px solid #fecaca}
.critical-row:hover td{background:#fef2f2 !important}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:4px;animation:blink 2s infinite}
.offline-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);display:inline-block;margin-right:4px}

/* ── facility cards (admin) ── */
.facility-card{background:#fff;border-radius:var(--radius-sm);border:1px solid var(--border);padding:14px 16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.facility-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.facility-card.selected{border-color:var(--primary);box-shadow:0 0 0 2px rgba(15,76,129,.2)}
.facility-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.facility-card.health-good::after{background:var(--accent)}
.facility-card.health-warn::after{background:var(--warn)}
.facility-card.health-poor::after{background:var(--danger)}
.fc-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.fc-score{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fc-score-num{font-size:22px;font-weight:700;letter-spacing:-.5px}
.fc-score-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.fc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fc-metric{font-size:11px;color:var(--text3)}
.fc-metric strong{color:var(--text2);font-weight:600}
.health-score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:4px}
.filter-bar{display:flex;align-items:center;gap:10px;background:var(--primary-ghost);border:1px solid #b8d0f0;border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar span{font-size:13px;color:var(--primary);font-weight:500}
.filter-bar .filter-label{font-size:12px;color:var(--text3)}
/* ── data quality (admin) ── */
.dq-issue{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.dq-issue:last-child{border-bottom:none}
.dq-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.dq-icon.high{background:var(--danger-light);color:var(--danger)}
.dq-icon.med{background:var(--warn-light);color:var(--warn)}
.dq-icon.low{background:var(--primary-ghost);color:var(--primary)}
.dq-body{flex:1}
.dq-title{font-size:13px;font-weight:500;color:var(--text)}
.dq-desc{font-size:12px;color:var(--text3);margin-top:2px}
.dq-count{font-size:20px;font-weight:700;color:var(--text);flex-shrink:0;text-align:right;min-width:40px}
/* ── audit log (admin) ── */
.audit-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.audit-row:last-child{border-bottom:none}
.audit-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px}
.ai-create{background:var(--accent-light);color:var(--accent)}
.ai-update{background:var(--primary-ghost);color:var(--primary)}
.ai-login{background:#f3f0ff;color:#6d28d9}
.ai-delete{background:var(--danger-light);color:var(--danger)}
.audit-body{flex:1;min-width:0}
.audit-text{font-size:13px;color:var(--text2);line-height:1.4}
.audit-text strong{color:var(--text)}
.audit-meta{font-size:11px;color:var(--text3);margin-top:2px}
.activity-bar-inline{height:6px;border-radius:3px;background:var(--accent);display:inline-block;vertical-align:middle}

/* ── handover summary (nurse) ── */
.handover-section{margin-bottom:16px}
.handover-section h4{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.handover-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.handover-row:last-child{border-bottom:none}
.handover-row .hr-label{color:var(--text2)}
.handover-row .hr-val{font-weight:600;color:var(--text)}
.handover-highlight{background:var(--accent-light);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.handover-highlight i{color:var(--accent);font-size:18px;flex-shrink:0}
.handover-highlight .hh-text{font-size:13px;color:var(--text2)}
.handover-highlight .hh-text strong{color:var(--text)}

/* ── gauge (nurse census) ── */
.gauge-track{height:12px;background:var(--border);border-radius:6px;overflow:hidden;margin-bottom:6px}
.gauge-fill{height:100%;border-radius:6px;transition:width .6s ease}
.gauge-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}

@media(max-width:640px){
  .vitals-strip{grid-template-columns:repeat(2,1fr)}
  .health-score-grid{grid-template-columns:1fr 1fr}
}

/* -- patient card -- */
.patient-header{display:flex;align-items:flex-start;gap:16px;padding:20px;border-bottom:1px solid var(--border)}
.patient-avatar{width:52px;height:52px;border-radius:50%;background:var(--primary-ghost);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:var(--primary);flex-shrink:0}
.patient-meta h2{font-size:18px;font-weight:600;letter-spacing:-.3px}
.patient-meta .smart-id{font-family:'DM Mono',monospace;font-size:12px;color:var(--primary);background:var(--primary-ghost);padding:2px 8px;border-radius:4px;display:inline-block;margin:3px 0}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px 20px}
.info-item .key{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.info-item .val{font-size:13px;font-weight:500;color:var(--text)}

/* -- vitals display -- */
.vitals-row{display:flex;gap:10px;flex-wrap:wrap;padding:14px 20px;background:var(--surface2);border-bottom:1px solid var(--border)}
.vital{background:white;border-radius:8px;padding:10px 14px;border:1px solid var(--border);text-align:center;min-width:80px}
.vital .v-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.vital .v-val{font-size:16px;font-weight:600;color:var(--primary);margin-top:2px}
.vital .v-unit{font-size:10px;color:var(--text3)}

/* -- encounter card -- */
.enc-card{border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden}
.enc-header{padding:12px 16px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.enc-body{padding:14px 16px;display:none}
.enc-body.open{display:block}
.enc-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.enc-detail .key{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.enc-detail .val{font-size:13px;color:var(--text2)}

/* -- chart bars -- */
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12px;color:var(--text2);width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--bg);border-radius:4px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--primary);transition:width .5s ease}
.bar-fill.accent{background:var(--accent)}
.bar-val{font-size:11px;color:var(--text3);width:28px;text-align:right;flex-shrink:0}

/* -- toast -- */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:white;padding:11px 18px;border-radius:var(--radius-sm);font-size:13px;z-index:1000;transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px;box-shadow:var(--shadow-md)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--accent)}
.toast.error{background:var(--danger)}

/* -- modal -- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:14px;width:100%;max-width:680px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h3{font-size:16px;font-weight:600}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}

/* -- misc -- */
.empty-state{text-align:center;padding:48px;color:var(--text3)}
.empty-state svg{opacity:.3;margin-bottom:10px}
.empty-state p{font-size:13px}
.tag{display:inline-block;background:var(--primary-ghost);color:var(--primary);font-size:11px;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace}
.flex{display:flex;align-items:center}
.gap-2{gap:8px}
.gap-3{gap:12px}
.mb-4{margin-bottom:16px}
.text-sm{font-size:12px;color:var(--text3)}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}
.dot-green{background:#10b981}.dot-blue{background:var(--primary)}.dot-warn{background:var(--warn)}
.trend-chart{display:flex;align-items:flex-end;gap:6px;height:60px;padding:0 4px}
.trend-bar{flex:1;background:var(--primary);border-radius:3px 3px 0 0;opacity:.7;transition:opacity .15s;min-width:0;position:relative}
.trend-bar:hover{opacity:1}
.trend-bar .tip{position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:var(--text);color:white;font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s}
.trend-bar:hover .tip{opacity:1}
.section-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="cross">🏥</div>
      <h1>SmartCare EMR</h1>
      <p>Ministry of Health · Republic of Zambia</p>
    </div>
    <div class="demo-accounts">
      <strong>Quick login</strong>
      <div class="demo-row">
        <div class="demo-chip" onclick="fillLogin('doctor','doctor123')">Doctor</div>
        <div class="demo-chip" onclick="fillLogin('nurse','nurse123')">Nurse</div>
        <div class="demo-chip" onclick="fillLogin('admin','admin123')">Admin</div>

<!-- APP -->
<div id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <h1>🏥 SmartCare</h1>
      <p>EMR System · Zambia</p>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">U</div>
      <div class="user-info">
        <p id="sidebar-name">User</p>
        <span id="sidebar-role">Role</span>
      </div>
    </div>
    <nav id="sidebar-nav"></nav>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <h2 id="page-title">Dashboard</h2>
      <!-- Doctor: quick patient search -->
      <div id="qs-wrap" style="display:none;position:relative;flex:1;max-width:340px;margin:0 16px">
        <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none"></i>
        <input id="qs-input" type="text" placeholder="Quick patient search…" autocomplete="off"
          style="width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s"
          oninput="handleQuickSearch(this.value)" onfocus="openQS()">
        <div id="qs-results" style="display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-md);z-index:100;max-height:320px;overflow-y:auto"></div>
      </div>
      <!-- Nurse: triage mode button -->
      <div id="triage-btn-wrap" style="display:none">
        <button class="btn btn-accent btn-sm" onclick="toggleTriageMode()">
          <i class="fa-solid fa-bolt"></i> Triage Mode
        </button>
      </div>
      <div class="topbar-right">
        <span class="text-sm" id="topbar-facility"></span>
        <span id="topbar-date" class="text-sm"></span>
      </div>

    <div class="page" id="page-content"></div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()" style="padding:4px 8px">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/js/role-dashboards.js"></script>
<script>
const API = '';
let token = localStorage.getItem('emr_token');
let currentUser = JSON.parse(localStorage.getItem('emr_user') || 'null');
let currentPage = 'dashboard';

// -- auth ----------------------------------------------------------------------
function fillLogin(u, p) {
  document.getElementById('l-user').value = u;
  document.getElementById('l-pass').value = p;
}

async function doLogin() {
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  const err = document.getElementById('l-err');
  err.style.display = 'none';
  try {
    const res = await fetch('/api/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error; err.style.display = 'block'; return; }
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('emr_token', token);
    localStorage.setItem('emr_user', JSON.stringify(currentUser));
    showApp();
  } catch(e) { err.textContent = 'Server error. Is the backend running?'; err.style.display = 'block'; }
}

function logout() {
  token = null; currentUser = null;
  localStorage.removeItem('emr_token'); localStorage.removeItem('emr_user');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

async function api(path, opts={}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers||{}) }
  });
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

// -- app shell -----------------------------------------------------------------
const ROLE_NAV = {
  doctor: `
    <div class="nav-section">Clinical</div>
    <div class="nav-item" data-page="dashboard" onclick="navigate('dashboard')"><i class="fa-solid fa-gauge-high fa-fw"></i> Dashboard</div>
    <div class="nav-item" data-page="patients" onclick="navigate('patients')"><i class="fa-solid fa-users fa-fw"></i> Patients</div>
    <div class="nav-item" data-page="encounters" onclick="navigate('encounters')"><i class="fa-solid fa-stethoscope fa-fw"></i> Encounters</div>
    <div class="nav-section">Tools</div>
    <div class="nav-item" data-page="reports" onclick="navigate('reports')"><i class="fa-solid fa-chart-bar fa-fw"></i> Reports</div>`,
  nurse: `
    <div class="nav-section">Nursing</div>
    <div class="nav-item" data-page="dashboard" onclick="navigate('dashboard')"><i class="fa-solid fa-gauge-high fa-fw"></i> Dashboard</div>
    <div class="nav-item" data-page="patients" onclick="navigate('patients')"><i class="fa-solid fa-users fa-fw"></i> Patients</div>
    <div class="nav-item" data-page="encounters" onclick="navigate('encounters')"><i class="fa-solid fa-stethoscope fa-fw"></i> Encounters</div>
    <div class="nav-section">Tools</div>
    <div class="nav-item" data-page="reports" onclick="navigate('reports')"><i class="fa-solid fa-chart-bar fa-fw"></i> Reports</div>`,
  admin: `
    <div class="nav-section">Main</div>
    <div class="nav-item" data-page="dashboard" onclick="navigate('dashboard')"><i class="fa-solid fa-gauge-high fa-fw"></i> Dashboard</div>
    <div class="nav-item" data-page="patients" onclick="navigate('patients')"><i class="fa-solid fa-users fa-fw"></i> Patients</div>
    <div class="nav-item" data-page="encounters" onclick="navigate('encounters')"><i class="fa-solid fa-stethoscope fa-fw"></i> Encounters</div>
    <div class="nav-section">Administration</div>
    <div class="nav-item" data-page="users" onclick="navigate('users')"><i class="fa-solid fa-users-gear fa-fw"></i> Users</div>
    <div class="nav-item" data-page="reports" onclick="navigate('reports')"><i class="fa-solid fa-chart-bar fa-fw"></i> Reports</div>`,
};

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  const role = currentUser.role;
  document.getElementById('sidebar-name').textContent = currentUser.name;
  document.getElementById('sidebar-role').textContent = role.toUpperCase();
  document.getElementById('sidebar-avatar').textContent = initials(currentUser.name);
  document.getElementById('topbar-facility').textContent = currentUser.facility;
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-ZM',{weekday:'short',year:'numeric',month:'short',day:'numeric'});

  // Build role-specific sidebar
  document.getElementById('sidebar-nav').innerHTML = ROLE_NAV[role] || ROLE_NAV.admin;

  // Show role-specific topbar enhancements
  document.getElementById('qs-wrap').style.display        = role === 'doctor' ? 'block'       : 'none';
  document.getElementById('triage-btn-wrap').style.display = role === 'nurse'  ? 'inline-flex' : 'none';

  navigate('dashboard');
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('#sidebar-nav .nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === page);
  });
  const titles = {
    dashboard:  'Dashboard',
    patients:   'Patients',
    encounters: 'Clinical Encounters',
    reports:    'Reports & Analytics',
    users:      'User Management',
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  document.getElementById('page-content').innerHTML = '<div class="loading">Loading…</div>';
  pages_map[page]();
}

// -- toast ---------------------------------------------------------------------
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3500);
}

// -- modal ---------------------------------------------------------------------
function openModal(title, body, footer='') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

// -- helpers -------------------------------------------------------------------
function age(dob) {
  const diff = Date.now() - new Date(dob).getTime();
  return Math.floor(diff / (1000*60*60*24*365.25));
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-ZM',{year:'numeric',month:'short',day:'numeric'});
}
function genderBadge(g) {
  return g === 'Male' ? '<span class="badge badge-blue">Male</span>' : '<span class="badge badge-green">Female</span>';
}
function encTypeBadge(t) {
  const m = {OPD:'badge-blue','ART Clinic':'badge-green',Inpatient:'badge-warn',MCH:'badge-green','TB Clinic':'badge-warn'};
  return `<span class="badge ${m[t]||'badge-gray'}">${t}</span>`;
}
function initials(name) { return (name||'').split(' ').map(w=>w[0]).slice(0,2).join(''); }

// -- DASHBOARD (role-aware router) --------------------------------------------
async function renderDashboard() {
  const d = await api('/api/dashboard');
  if (!d) return;
  if (d.role === 'doctor') return renderDoctorDashboard(d);
  if (d.role === 'nurse')  return renderNurseDashboard(d);
  return renderAdminDashboard(d);
}

// ── DOCTOR DASHBOARD ─────────────────────────────────────────────────────────
function renderDoctorDashboard(d) {
  const s = d.stats;
  const pc = document.getElementById('page-content');
  pc.innerHTML = `
  <div style="display:flex;align-items:center;gap:16px;background:#fff;border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;border:1px solid var(--border);box-shadow:var(--shadow);flex-wrap:wrap">
    <div style="width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--primary-ghost);color:var(--primary);flex-shrink:0"><i class="fa-solid fa-user-doctor"></i></div>
    <div style="flex:1;min-width:0">
      <div style="font-size:15px;font-weight:600;letter-spacing:-.2px">${d.clinician_name||currentUser.name}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px">${d.facility||currentUser.facility} · Clinical Workstation</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="showEncounterModalSearch()"><i class="fa-solid fa-stethoscope"></i> New Encounter</button>
      <button class="btn btn-outline btn-sm" onclick="navigate('patients')"><i class="fa-solid fa-users"></i> Patients</button>
    </div>
  </div>
  <div class="stats-grid">
    <div class="stat-card primary"><div class="label"><i class="fa-solid fa-users fa-fw"></i> My Patients</div><div class="value">${s.total_my_patients}</div><div class="sub">Patients I have seen</div></div>
    <div class="stat-card accent"><div class="label"><i class="fa-solid fa-stethoscope fa-fw"></i> My Encounters</div><div class="value">${s.total_my_encounters}</div><div class="sub">${s.today_my_encounters} today · ${s.monthly_my_encounters} this month</div></div>
    <div class="stat-card warn"><div class="label"><i class="fa-solid fa-calendar-check fa-fw"></i> Upcoming Follow-ups</div><div class="value">${s.upcoming_followups}</div><div class="sub">Next 14 days</div></div>
    <div class="stat-card danger"><div class="label"><i class="fa-solid fa-triangle-exclamation fa-fw"></i> Overdue Follow-ups</div><div class="value">${s.overdue_followups}</div><div class="sub">Past due date</div></div>
  </div>
  <div class="grid-2 mb-4">
    ${_doctorFollowupCard(d.upcoming_followups, d.overdue_followups)}
    ${_doctorRecentCard(d.recent_encounters)}
  </div>
  <div class="grid-2 mb-4">
    ${_doctorDiagnosisCard(d.top_diagnoses)}
    ${_doctorTrendCard(d.monthly_trend, d.enc_types)}
  </div>`;
}

function _doctorFollowupCard(upcoming, overdue) {
  const rows = upcoming.slice(0,5).map(f=>`
    <tr style="cursor:pointer" onclick="viewPatient(${f.patient_id})">
      <td><div class="patient-name">${f.patient_name}</div><div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${f.smart_id}</div></td>
      <td><span class="badge ${f.days_away===0?'badge-warn':'badge-blue'}">${f.days_away===0?'Today':f.days_away+' day'+(f.days_away!==1?'s':'')}</span></td>
      <td style="font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.last_diagnosis||'—'}</td>
    </tr>`).join('');
  const overdueRows = overdue.slice(0,3).map(f=>`
    <tr style="cursor:pointer;background:#fff5f5" onclick="viewPatient(${f.patient_id})">
      <td><div class="patient-name">${f.patient_name}</div><div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${f.smart_id}</div></td>
      <td><span class="badge badge-red">${f.days_overdue}d overdue</span></td>
      <td style="font-size:12px">${f.last_diagnosis||'—'}</td>
    </tr>`).join('');
  return `<div class="card">
    <div class="card-header"><h3><i class="fa-solid fa-calendar-check fa-fw" style="color:var(--accent)"></i> Follow-ups</h3>
      ${overdue.length?`<span class="badge badge-red">${overdue.length} overdue</span>`:''}
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Patient</th><th>Due</th><th>Last Diagnosis</th></tr></thead>
      <tbody>${rows}${overdueRows}${!upcoming.length&&!overdue.length?'<tr><td colspan="3"><div class="empty-state"><p>No follow-ups due</p></div></td></tr>':''}</tbody>
    </table></div>
  </div>`;
}

function _doctorRecentCard(encounters) {
  const rows = encounters.slice(0,6).map(e=>`
    <tr>
      <td><div class="patient-name">${e.patient_name}</div><span class="tag" style="font-size:10px">${e.smart_id}</span></td>
      <td>${encTypeBadge(e.encounter_type)}</td>
      <td style="font-size:12px">${fmtDate(e.visit_date)}</td>
      <td style="font-size:12px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.diagnosis||e.chief_complaint||'—'}</td>
    </tr>`).join('');
  return `<div class="card">
    <div class="card-header"><h3><i class="fa-solid fa-stethoscope fa-fw" style="color:var(--primary)"></i> My Recent Encounters</h3>
      <button class="btn btn-ghost btn-sm" onclick="navigate('encounters')">View all →</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Patient</th><th>Type</th><th>Date</th><th>Diagnosis</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="4"><div class="empty-state"><p>No encounters yet</p></div></td></tr>'}</tbody>
    </table></div>
  </div>`;
}

function _doctorDiagnosisCard(diags) {
  const max = Math.max(...diags.map(x=>x.cnt), 1);
  return `<div class="card">
    <div class="card-header"><h3><i class="fa-solid fa-disease fa-fw" style="color:var(--warn)"></i> My Top Diagnoses</h3></div>
    <div class="card-body">
      <div class="bar-chart">
        ${diags.map(x=>`
        <div class="bar-row">
          <div class="bar-label">${x.diagnosis}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round((x.cnt/max)*100)}%"></div></div>
          <div class="bar-val">${x.cnt}</div>
        </div>`).join('')||'<div class="empty-state"><p>No diagnoses recorded yet</p></div>'}
      </div>
    </div>
  </div>`;
}

function _doctorTrendCard(trend, encTypes) {
  const max = Math.max(...trend.map(t=>t.cnt), 1);
  const maxT = Math.max(...encTypes.map(e=>e.cnt), 1);
  return `<div class="card">
    <div class="card-header"><h3><i class="fa-solid fa-chart-column fa-fw" style="color:var(--primary)"></i> My Monthly Workload</h3></div>
    <div class="card-body">
      <div style="display:flex;align-items:flex-end;gap:6px;height:80px;padding-bottom:6px;margin-bottom:12px">
        ${trend.map(m=>`
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
          <span style="font-size:10px;color:var(--text3)">${m.cnt}</span>
          <div style="width:100%;background:var(--primary);border-radius:3px 3px 0 0;height:${Math.max(3,Math.round((m.cnt/max)*60))}px;opacity:.8"></div>
          <span style="font-size:9px;color:var(--text3)">${m.month.slice(5)}</span>
        </div>`).join('')}
      </div>
      <div class="bar-chart">
        ${encTypes.map(e=>`
        <div class="bar-row">
          <div class="bar-label">${e.encounter_type}</div>
          <div class="bar-track"><div class="bar-fill accent" style="width:${Math.round((e.cnt/maxT)*100)}%"></div></div>
          <div class="bar-val">${e.cnt}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

  // (old generic dashboard block removed — role dashboards above handle this)


// -- PATIENTS ------------------------------------------------------------------
async function renderPatients(q='') {
  const patients = await api(`/api/patients?q=${encodeURIComponent(q)}`);
  if (!patients) return;
  document.getElementById('page-content').innerHTML = `
  <div class="flex gap-2 mb-4" style="justify-content:space-between">
    <div class="search-bar">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="patient-search" placeholder="Search by name, SmartID, NRC, phone…" value="${q}" oninput="debounceSearch(this.value)">
    </div>
    <button class="btn btn-primary" onclick="showRegisterModal()"><i class="fa-solid fa-user-plus"></i> Register Patient</button>
  </div>

function toggleEnc(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  body.classList.toggle('open');
  chevron.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
}

async function submitRegister() {
  const d = {
    first_name: document.getElementById('rf-first').value.trim(),
    last_name: document.getElementById('rf-last').value.trim(),
    date_of_birth: document.getElementById('rf-dob').value,
    gender: document.getElementById('rf-gender').value,
    nrc_number: document.getElementById('rf-nrc').value.trim(),
    phone: document.getElementById('rf-phone').value.trim(),
    province: document.getElementById('rf-province').value,
    district: document.getElementById('rf-district').value.trim(),
    address: document.getElementById('rf-address').value.trim(),
    facility: document.getElementById('rf-facility').value.trim(),
    blood_group: document.getElementById('rf-blood').value,
    allergies: document.getElementById('rf-allergy').value.trim(),
    next_of_kin: document.getElementById('rf-kin').value.trim(),
    next_of_kin_phone: document.getElementById('rf-kin-phone').value.trim(),
  };
  if (!d.first_name || !d.last_name || !d.date_of_birth) {
    toast('Please fill in required fields (name, DOB)', 'error'); return;
  }
  const res = await api('/api/patients', {method:'POST', body:JSON.stringify(d)});
  if (res && res.success) {
    closeModal();
    toast(`Patient registered — SmartID: ${res.smart_id}`, 'success');
    navigate('patients');
  } else {
    toast(res?.error || 'Registration failed', 'error');
  }
}

async function searchForEnc(q) {
  if (q.length < 2) { document.getElementById('enc-search-results').innerHTML = ''; return; }
  const patients = await api(`/api/patients?q=${encodeURIComponent(q)}`);
  const el = document.getElementById('enc-search-results');
  if (!el) return;
  if (!patients || patients.length === 0) { el.innerHTML = '<p style="font-size:13px;color:var(--text3)">No patients found</p>'; return; }
  el.innerHTML = patients.slice(0,5).map(p=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-weight:500;font-size:13px">${p.first_name} ${p.last_name}</div>
        <div style="font-size:11px;color:var(--text3)">${p.smart_id} · ${age(p.date_of_birth)} yrs</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="showEncounterModal(${p.id},'${p.first_name} ${p.last_name}')">Select →</button>
    </div>`).join('');
}

          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <span style="font-size:11px;color:var(--text3)">${m.cnt}</span>
            <div style="width:100%;background:var(--primary);border-radius:4px 4px 0 0;height:${Math.max(4,Math.round((m.cnt/Math.max(...d.monthly_trend.map(x=>x.cnt),1))*80))}px"></div>
            <span style="font-size:10px;color:var(--text3)">${m.month.slice(5)}</span>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}

// -- USERS ---------------------------------------------------------------------
async function renderUsers() {
  const users = await api('/api/users');
  if (!users) return;
  const isAdmin = currentUser.role === 'admin';
  document.getElementById('page-content').innerHTML = `
  <div class="flex gap-2 mb-4" style="justify-content:space-between">
    <div></div>
    ${isAdmin ? `<button class="btn btn-primary" onclick="showAddUserModal()">+ Add User</button>` : ''}
  </div>
  <div class="card">
    <div class="card-header"><h3>${users.length} system users</h3></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Facility</th><th>Joined</th></tr></thead>
        <tbody>
          ${users.map(u=>`
          <tr>
            <td>
              <div style="display:flex;align-items:center;gap:8px">
                <div class="user-avatar" style="width:30px;height:30px;font-size:11px;background:var(--primary-ghost);color:var(--primary)">${initials(u.name)}</div>
                <span class="patient-name">${u.name}</span>
              </div>
            </td>
            <td style="font-family:'DM Mono',monospace;font-size:12px">${u.username}</td>
            <td>${roleBadge(u.role)}</td>
            <td style="font-size:12px">${u.facility||'—'}</td>
            <td>${fmtDate(u.created_at)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function roleBadge(r) {
  const m = {doctor:'badge-blue',nurse:'badge-green',admin:'badge-warn'};
  return `<span class="badge ${m[r]||'badge-gray'}">${r}</span>`;
}

function showAddUserModal() {
  openModal('Add New User', `
  <div class="form-grid">
    <div class="field span-2"><label>Full Name *</label><input id="uf-name" placeholder="Full name"></div>
    <div class="field"><label>Username *</label><input id="uf-user" placeholder="Login username"></div>
    <div class="field"><label>Password *</label><input id="uf-pass" type="password" placeholder="Password"></div>
    <div class="field"><label>Role *</label>
      <select id="uf-role"><option>doctor</option><option>nurse</option><option>admin</option></select>
    </div>
    <div class="field"><label>Facility</label><input id="uf-facility" value="${currentUser.facility}"></div>
  </div>`,
  `<button class="btn btn-outline" onclick="closeModal()">Cancel</button>
   <button class="btn btn-primary" onclick="submitAddUser()">Create User</button>`);
}

async function submitAddUser() {
  const d = {
    name: document.getElementById('uf-name').value.trim(),
    username: document.getElementById('uf-user').value.trim(),
    password: document.getElementById('uf-pass').value,
    role: document.getElementById('uf-role').value,
    facility: document.getElementById('uf-facility').value.trim(),
  };
  if (!d.name || !d.username || !d.password) { toast('All fields required', 'error'); return; }
  const res = await api('/api/users', {method:'POST', body:JSON.stringify(d)});
  if (res && res.success) {
    closeModal(); toast('User created', 'success'); navigate('users');
  } else { toast(res?.error || 'Failed', 'error'); }
}

// -- router --------------------------------------------------------------------
const pages_map = {
  dashboard:  renderDashboard,
  patients:   () => renderPatients(),
  encounters: renderEncounters,
  reports:    renderReports,
  users:      renderUsers
};

// -- init ----------------------------------------------------------------------
if (token && currentUser) {
  showApp();
} else {
  document.getElementById('login-screen').style.display = 'flex';
}
</script>
</body>
