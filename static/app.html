<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCare EMR</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1><i class="fa-solid fa-hospital-user"></i> SmartCare</h1>
          <p>EMR System &middot; Zambia</p>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">U</div>
      <div class="user-info">
        <p id="sidebar-name">User</p>
        <span id="sidebar-role">Role</span>
      </div>
    </div>
    <nav id="sidebar-nav" aria-label="Main navigation"></nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Sign Out
      </button>
    </div>
  </aside>

  <!-- Main area -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="Toggle navigation">
          <i class="fa-solid fa-bars"></i>
        </button>
        <h2 id="page-title">Dashboard</h2>
      </div>

      <!-- Doctor: quick patient search -->
      <div id="qs-wrap" class="qs-wrap" style="display:none">
        <i class="fa-solid fa-magnifying-glass qs-icon"></i>
        <input id="qs-input" type="text" class="qs-input"
               placeholder="Quick patient search…" autocomplete="off"
               oninput="handleQuickSearch(this.value)" onfocus="openQS()">
        <div id="qs-results" class="qs-results"></div>
      </div>

      <!-- Nurse: batch triage button -->
      <div id="triage-btn-wrap" style="display:none">
        <button class="btn btn-accent btn-sm" onclick="startBatchTriage()">
          <i class="fa-solid fa-bolt"></i> Batch Triage
        </button>
      </div>

      <div class="topbar-right">
        <span class="text-sm" id="topbar-facility"></span>
        <span class="text-sm" id="topbar-date"></span>
      </div>
    </header>

    <main class="page" id="page-content" aria-live="polite">
      <div class="loading">
        <i class="fa-solid fa-spinner fa-spin"></i> Loading…
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()" aria-label="Close modal">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Scripts: auth first (shared state), then role dashboards, then pages -->
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/dashboard.doctor.js"></script>
  <script src="/static/js/dashboard.nurse.js"></script>
  <script src="/static/js/dashboard.admin.js"></script>
  <script src="/static/js/pages.js"></script>
  <script src="/static/js/app.js"></script>

</body>
</html>
