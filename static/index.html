<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCare EMR — Zambia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--surface:#fff;--surface2:#f7f9fc;
  --border:#e2e8f0;--border2:#cbd5e1;
  --primary:#0f4c81;--primary-light:#1a69b3;--primary-ghost:#e8f0fb;
  --accent:#00a878;--accent-light:#e6f7f3;
  --danger:#dc2626;--danger-light:#fef2f2;
  --warn:#d97706;--warn-light:#fffbeb;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
  --sidebar-w:224px;
}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
</style>
<style>
/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#0f4c81 0%,#1a69b3 45%,#00a878 100%);padding:16px;overflow-y:auto}
.login-card{background:white;border-radius:16px;padding:32px 36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo .cross{font-size:38px;margin-bottom:8px;display:block}
.login-logo h1{font-size:22px;font-weight:600;color:var(--primary);letter-spacing:-.3px;display:flex;align-items:center;justify-content:center;gap:8px}
.login-logo p{font-size:12px;color:var(--text3);margin-top:4px}
/* APP SHELL */
#app{display:none;height:100vh;flex-direction:row;overflow:hidden}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99}
.sidebar-overlay.open{display:block}
/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--primary);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;z-index:100;transition:transform .25s ease}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo h1{font-size:16px;font-weight:600;color:white}
.sidebar-logo p{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.sidebar-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:white;flex-shrink:0}
.user-info p{font-size:12px;font-weight:500;color:white;line-height:1.3}
.user-info span{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.4px}
nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-section{padding:14px 18px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;color:rgba(255,255,255,.65);font-size:13px;transition:all .15s;border-left:3px solid transparent;touch-action:manipulation}
.nav-item:hover{color:white;background:rgba(255,255,255,.07)}
.nav-item.active{color:white;background:rgba(255,255,255,.13);border-left-color:var(--accent);font-weight:500}
.nav-item i{width:16px;font-size:14px;text-align:center;flex-shrink:0}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1)}
.logout-btn{width:100%;padding:9px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:var(--radius-sm);color:rgba(255,255,255,.7);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.logout-btn:hover{background:rgba(255,255,255,.15);color:white}
</style>
<style>
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:white;border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0}
.topbar h2{font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:var(--text)}
.hamburger i{font-size:18px}
.page{flex:1;overflow-y:auto;padding:20px}
/* CARDS */
.card{background:white;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
.card--danger-border{border-left:3px solid var(--danger)}
.card--warn-border{border-left:3px solid var(--warn)}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-header h3{font-size:14px;font-weight:600;color:var(--text)}
.card-body{padding:16px 18px}
.mb-4{margin-bottom:16px}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:white;border-radius:var(--radius);padding:16px 18px;border:1px solid var(--border);box-shadow:var(--shadow)}
.stat-card .label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-card .value{font-size:26px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.5px}
.stat-card .sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat-card.accent{border-left:3px solid var(--accent)}
.stat-card.primary{border-left:3px solid var(--primary)}
.stat-card.warn{border-left:3px solid var(--warn)}
.stat-card.danger{border-left:3px solid var(--danger)}
/* BANNER */
.dash-banner{display:flex;align-items:center;gap:16px;background:white;border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;border:1px solid var(--border);box-shadow:var(--shadow);flex-wrap:wrap}
.dash-banner__icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.dash-banner--doctor .dash-banner__icon{background:var(--primary-ghost);color:var(--primary)}
.dash-banner--nurse  .dash-banner__icon{background:var(--accent-light);color:var(--accent)}
.dash-banner--admin  .dash-banner__icon{background:var(--warn-light);color:var(--warn)}
.dash-banner__body{flex:1;min-width:0}
.dash-banner__name{font-size:15px;font-weight:600;color:var(--text)}
.dash-banner__meta{font-size:12px;color:var(--text3);margin-top:2px}
.dash-banner__actions{display:flex;gap:8px;flex-wrap:wrap}
/* GRIDS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
</style>
<style>
/* TABLES */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.patient-name{font-weight:500;color:var(--text)}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-green{background:var(--accent-light);color:#065f46}
.badge-blue{background:var(--primary-ghost);color:var(--primary)}
.badge-warn{background:var(--warn-light);color:#92400e}
.badge-red{background:var(--danger-light);color:var(--danger)}
.badge-gray{background:#f1f5f9;color:var(--text3)}
/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.form-grid.cols-1{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field.span-2{grid-column:span 2}
label{font-size:12px;font-weight:500;color:var(--text2)}
input,select,textarea{padding:9px 11px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--text);background:white;transition:border-color .15s;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(26,105,179,.1)}
textarea{resize:vertical;min-height:70px}
.section-divider{grid-column:1/-1;padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px}
.section-divider h4{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
/* BUTTONS */
.btn{padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:6px;touch-action:manipulation;white-space:nowrap}
.btn-primary{background:var(--primary);color:white}.btn-primary:hover{background:var(--primary-light)}
.btn-accent{background:var(--accent);color:white}.btn-accent:hover{background:#00956a}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}.btn-outline:hover{background:var(--surface2)}
.btn-ghost{background:transparent;color:var(--primary);border:none;padding:6px 10px;font-size:12px}.btn-ghost:hover{background:var(--primary-ghost)}
.btn-danger{background:var(--danger);color:white}
.btn-sm{padding:5px 11px;font-size:12px}
/* SEARCH BAR */
.search-bar{display:flex;align-items:center;gap:10px;background:white;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 12px;flex:1;max-width:380px}
.search-bar input{border:none;outline:none;font-size:13px;flex:1;background:transparent;color:var(--text);padding:0;box-shadow:none}
.search-bar i{color:var(--text3);flex-shrink:0;font-size:13px}
/* PATIENT DETAIL */
.patient-header{display:flex;align-items:flex-start;gap:16px;padding:18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.patient-avatar{width:52px;height:52px;border-radius:50%;background:var(--primary-ghost);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:var(--primary);flex-shrink:0}
.patient-meta{flex:1;min-width:0}
.patient-meta h2{font-size:18px;font-weight:600;letter-spacing:-.3px}
.patient-meta .smart-id{font-family:'DM Mono',monospace;font-size:12px;color:var(--primary);background:var(--primary-ghost);padding:2px 8px;border-radius:4px;display:inline-block;margin:3px 0}
.patient-actions{display:flex;gap:8px;flex-wrap:wrap}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px 18px}
.info-item .key{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.info-item .val{font-size:13px;font-weight:500;color:var(--text)}
</style>
<style>
/* VITALS */
.vitals-row{display:flex;gap:10px;flex-wrap:wrap;padding:14px 18px;background:var(--surface2);border-bottom:1px solid var(--border)}
.vital{background:white;border-radius:8px;padding:10px 14px;border:1px solid var(--border);text-align:center;min-width:76px}
.vital .v-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.vital .v-val{font-size:16px;font-weight:600;color:var(--primary);margin-top:2px}
.vital .v-unit{font-size:10px;color:var(--text3)}
/* ENCOUNTERS */
.enc-card{border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden}
.enc-header{padding:12px 14px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:8px}
.enc-header-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.enc-header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.enc-body{padding:14px 16px;display:none}
.enc-body.open{display:block}
.enc-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.enc-detail .key{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.enc-detail .val{font-size:13px;color:var(--text2)}
/* BAR CHARTS */
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12px;color:var(--text2);width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--bg);border-radius:4px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--primary);transition:width .5s ease}
.bar-fill.accent{background:var(--accent)}
.bar-val{font-size:11px;color:var(--text3);width:28px;text-align:right;flex-shrink:0}
/* TREND CHART */
.trend-chart{display:flex;align-items:flex-end;gap:6px;height:60px;padding:0 4px}
.trend-bar{flex:1;background:var(--primary);border-radius:3px 3px 0 0;opacity:.7;transition:opacity .15s;min-width:0;position:relative}
.trend-bar:hover{opacity:1}
.trend-bar .tip{position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:var(--text);color:white;font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s}
.trend-bar:hover .tip{opacity:1}
/* MISC */
.empty-state{text-align:center;padding:36px;color:var(--text3)}
.empty-state p{font-size:13px}
.tag{display:inline-block;background:var(--primary-ghost);color:var(--primary);font-size:11px;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.section-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px}
.page-toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.text-sm{font-size:12px;color:var(--text3)}
/* TOAST */
.toast{position:fixed;bottom:24px;right:16px;left:16px;max-width:360px;margin:0 auto;background:var(--text);color:white;padding:11px 18px;border-radius:var(--radius-sm);font-size:13px;z-index:1000;transform:translateY(80px);opacity:0;transition:all .3s;box-shadow:var(--shadow-md)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--accent)}.toast.error{background:var(--danger)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:16px 16px 0 0;width:100%;max-width:700px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h3{font-size:16px;font-weight:600}
.modal-body{padding:20px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;flex-wrap:wrap}
/* TRIAGE */
@keyframes pulse-anim{0%,100%{opacity:1}50%{opacity:.7}}
.critical-label{display:inline-flex;align-items:center;gap:4px;background:var(--danger);color:#fff;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;animation:pulse-anim 2s infinite}
/* DATA QUALITY */
.dq-issue{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.dq-issue:last-child{border-bottom:none}
.dq-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.dq-icon.high{background:var(--danger-light);color:var(--danger)}
.dq-icon.med{background:var(--warn-light);color:var(--warn)}
.dq-icon.low{background:var(--primary-ghost);color:var(--primary)}
.dq-body{flex:1}
.dq-title{font-size:13px;font-weight:500;color:var(--text)}
.dq-desc{font-size:12px;color:var(--text3);margin-top:2px}
.dq-count{font-size:22px;font-weight:700;flex-shrink:0;text-align:right;min-width:40px}
/* QUICK SEARCH */
.qsr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.qsr-item:last-child{border-bottom:none}
.qsr-item:hover{background:var(--bg)}
.qsr-avatar{width:30px;height:30px;border-radius:50%;background:var(--primary-ghost);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.qsr-body{flex:1;min-width:0}
.qsr-name{font-size:13px;font-weight:500;color:var(--text)}
.qsr-meta{font-size:11px;color:var(--text3);margin-top:2px}
</style>
<style>
/* RESPONSIVE */
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr 1fr}.info-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.2)}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:flex}
  #topbar-facility,#topbar-date{display:none}
  .page{padding:14px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .info-grid{grid-template-columns:1fr 1fr}
  .enc-detail-grid{grid-template-columns:1fr}
  .form-grid,.form-grid.cols-3{grid-template-columns:1fr}
  .field.span-2{grid-column:span 1}
  .search-bar{max-width:100%}
  .patient-header{flex-direction:column}
  .patient-actions{width:100%}
  .patient-actions .btn{flex:1;justify-content:center}
  .topbar{padding:0 14px}
  .toast{bottom:16px;right:12px;left:12px}
  .dash-banner{flex-direction:column;align-items:flex-start}
  .dash-banner__actions{width:100%}
  .dash-banner__actions .btn{flex:1;justify-content:center}
  .modal{max-height:95vh;border-radius:16px 16px 0 0}
  .modal-footer{flex-direction:column}
  .modal-footer .btn{width:100%;justify-content:center}
}
@media(max-width:380px){.stats-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <span class="cross"><i class="fa-solid fa-hospital" style="color:var(--primary)"></i></span>
      <h1><i class="fa-solid fa-heart-pulse"></i> SmartCare EMR</h1>
      <p>Ministry of Health · Republic of Zambia</p>
    </div>
    <div class="field" style="margin-bottom:14px">
      <label><i class="fas fa-user"></i> Username</label>
      <input type="text" id="l-user" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="field" style="margin-bottom:20px">
      <label><i class="fas fa-lock"></i> Password</label>
      <input type="password" id="l-pass" placeholder="Enter password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;font-size:14px" onclick="doLogin()">
      <i class="fa-solid fa-sign-in-alt"></i> Sign In
    </button>
    <p id="l-err" style="color:var(--danger);font-size:12px;margin-top:12px;text-align:center;display:none;line-height:1.4"></p>
  </div>
</div>

<!-- APP SHELL -->
<div id="app">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1><i class="fa-solid fa-hospital-user" style="margin-right:6px"></i>SmartCare</h1>
      <p>EMR System · Zambia</p>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">U</div>
      <div class="user-info">
        <p id="sidebar-name">User</p>
        <span id="sidebar-role">Role</span>
      </div>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">

<script>
/* ═══════════════ CORE — auth, routing, helpers ═══════════════ */
const API = '';
let token = localStorage.getItem('emr_token');
let refreshToken = localStorage.getItem('emr_refresh');
let currentUser  = JSON.parse(localStorage.getItem('emr_user') || 'null');
let currentPage  = 'dashboard';
let _refreshTimer = null;

const ROLE_NAV = {
  doctor:`
    <div class="nav-section">Clinical</div>
    <div class="nav-item" data-page="dashboard" onclick="navigate('dashboard')"><i class="fa-solid fa-gauge-high fa-fw"></i> Dashboard</div>
    <div class="nav-item" data-page="patients" onclick="navigate('patients')"><i class="fa-solid fa-users fa-fw"></i> Patients</div>
    <div class="nav-item" data-page="encounters" onclick="navigate('encounters')"><i class="fa-solid fa-stethoscope fa-fw"></i> Encounters</div>
    <div class="nav-section">Tools</div>
    <div class="nav-item" data-page="reports" onclick="navigate('reports')"><i class="fa-solid fa-chart-bar fa-fw"></i> Reports</div>`,
  nurse:`
    <div class="nav-section">Nursing</div>
    <div class="nav-item" data-page="dashboard" onclick="navigate('dashboard')"><i class="fa-solid fa-gauge-high fa-fw"></i> Dashboard</div>
    <div class="nav-item" data-page="patients" onclick="navigate('patients')"><i class="fa-solid fa-users fa-fw"></i> Patients</div>
    <div class="nav-item" data-page="encounters" onclick="navigate('encounters')"><i class="fa-solid fa-stethoscope fa-fw"></i> Encounters</div>
    <div class="nav-section">Tools</div>
    <div class="nav-item" data-page="reports" onclick="navigate('reports')"><i class="fa-solid fa-chart-bar fa-fw"></i> Reports</div>`,
  admin:`
    <div class="nav-section">Main</div>
    <div class="nav-item" data-page="dashboard" onclick="navigate('dashboard')"><i class="fa-solid fa-gauge-high fa-fw"></i> Dashboard</div>
    <div class="nav-item" data-page="patients" onclick="navigate('patients')"><i class="fa-solid fa-users fa-fw"></i> Patients</div>
    <div class="nav-item" data-page="encounters" onclick="navigate('encounters')"><i class="fa-solid fa-stethoscope fa-fw"></i> Encounters</div>
    <div class="nav-section">Administration</div>
    <div class="nav-item" data-page="users" onclick="navigate('users')"><i class="fa-solid fa-users-gear fa-fw"></i> Users</div>
    <div class="nav-item" data-page="reports" onclick="navigate('reports')"><i class="fa-solid fa-chart-bar fa-fw"></i> Reports</div>`,
};

/* ── auth ── */
async function doLogin() {
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  const err = document.getElementById('l-err');
  const btn = document.querySelector('#login-screen .btn-primary');
  err.style.display = 'none';
  if (!username || !password) {
    err.textContent = 'Please enter your username and password.';
    err.style.display = 'block'; return;
  }
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in…'; }
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      err.textContent = data.error || 'Invalid credentials';
      err.style.display = 'block'; return;
    }
    _storeSession(data.token, data.refresh, data.user);
    showApp();
  } catch (e) {
    err.textContent = 'Cannot reach server. If on Render free plan, wait 30 seconds for it to wake up and try again.';
    err.style.display = 'block';
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-sign-in-alt"></i> Sign In'; }
  }
}

function _storeSession(accessToken, refresh, user) {
  token = accessToken;
  refreshToken = refresh || null;
  currentUser  = user;
  localStorage.setItem('emr_token',   token);
  localStorage.setItem('emr_refresh', refreshToken || '');
  localStorage.setItem('emr_user',    JSON.stringify(currentUser));
  _scheduleRefresh();
}

function _scheduleRefresh() {
  if (_refreshTimer) clearTimeout(_refreshTimer);
  try {
    const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    const ms = Math.max((payload.exp * 1000) - Date.now() - 60000, 0);
    _refreshTimer = setTimeout(_silentRefresh, ms);
  } catch {
    _refreshTimer = setTimeout(_silentRefresh, 55 * 60 * 1000);
  }
}

async function _silentRefresh() {
  if (!refreshToken) { logout(); return; }
  try {
    const res  = await fetch('/api/token/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh: refreshToken }),
    });
    if (!res.ok) { logout(); return; }
    const data = await res.json();
    _storeSession(data.token, data.refresh, currentUser);
  } catch { logout(); }
}

async function logout() {
  if (refreshToken) {
    try {
      await fetch('/api/logout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ refresh: refreshToken }),
      });
    } catch {}
  }
  if (_refreshTimer) clearTimeout(_refreshTimer);
  token = null; refreshToken = null; currentUser = null;
  localStorage.removeItem('emr_token');
  localStorage.removeItem('emr_refresh');
  localStorage.removeItem('emr_user');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

async function api(path, opts = {}) {
  const doFetch = (t) => fetch(API + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${t}`, ...(opts.headers || {}) },
  });
  let res = await doFetch(token);
  if (res.status === 401 && refreshToken) {
    await _silentRefresh();
    if (!token) return null;
    res = await doFetch(token);
    if (res.status === 401) { logout(); return null; }
  } else if (res.status === 401) { logout(); return null; }
  return res.json();
}

/* ── app shell ── */
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const role = currentUser.role;
  const nav = ROLE_NAV[role];
  if (!nav) { logout(); return; }
  document.getElementById('sidebar-name').textContent    = currentUser.name;
  document.getElementById('sidebar-role').textContent    = role.toUpperCase();
  document.getElementById('sidebar-avatar').textContent  = initials(currentUser.name);
  document.getElementById('topbar-facility').textContent = currentUser.facility;
  document.getElementById('topbar-date').textContent     = new Date().toLocaleDateString('en-ZM',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
  document.getElementById('sidebar-nav').innerHTML = nav;
  document.getElementById('qs-wrap').style.display         = role === 'doctor' ? 'block'       : 'none';
  document.getElementById('triage-btn-wrap').style.display = role === 'nurse'  ? 'inline-flex' : 'none';
  navigate('dashboard');
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('#sidebar-nav .nav-item').forEach(n =>
    n.classList.toggle('active', n.dataset.page === page));
  const titles = { dashboard:'Dashboard', patients:'Patients', encounters:'Clinical Encounters', reports:'Reports & Analytics', users:'User Management' };
  document.getElementById('page-title').textContent = titles[page] || page;
  document.getElementById('page-content').innerHTML =
    `<div class="loading"><i class="fa-solid fa-spinner fa-spin" style="font-size:22px;color:var(--primary);display:block;margin-bottom:10px"></i>Loading…</div>`;
  closeSidebar();
  pages_map[page]();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3500);
}

function openModal(title, body, footer = '') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML    = body;
  document.getElementById('modal-footer').innerHTML  = footer;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

/* ── shared helpers ── */
function age(dob)  { return Math.floor((Date.now() - new Date(dob)) / (1000*60*60*24*365.25)); }
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-ZM',{year:'numeric',month:'short',day:'numeric'}) : '—'; }
function initials(name) { return (name||'').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function genderBadge(g) { return g==='Male'?'<span class="badge badge-blue">Male</span>':'<span class="badge badge-green">Female</span>'; }
function encTypeBadge(t) {
  const m={OPD:'badge-blue','ART Clinic':'badge-green',Inpatient:'badge-warn',MCH:'badge-green','TB Clinic':'badge-warn',Emergency:'badge-red'};
  return `<span class="badge ${m[t]||'badge-gray'}">${t}</span>`;
}
function roleBadge(r) { const m={doctor:'badge-blue',nurse:'badge-green',admin:'badge-warn'}; return `<span class="badge ${m[r]||'badge-gray'}">${r}</span>`; }
function toggleEnc(header) {
  const body=header.nextElementSibling, chevron=header.querySelector('.chevron');
  body.classList.toggle('open');
  if(chevron) chevron.style.transform = body.classList.contains('open')?'rotate(180deg)':'';
}
function _todayLabel() { return new Date().toLocaleDateString('en-ZM',{weekday:'long',day:'numeric',month:'long'}); }
</script>

    <div class="stat-card accent"><div class="label"><i class="fa-solid fa-stethoscope fa-fw"></i> Encounters Today</div><div class="value">${s.encounters_today}</div><div class="sub">${s.encounters_month} this month</div></div>
    <div class="stat-card ${s.vitals_pending>0?'warn':'accent'}"><div class="label"><i class="fa-solid fa-heart-pulse fa-fw"></i> Vitals Pending</div><div class="value">${s.vitals_pending}</div><div class="sub"><div style="background:var(--border);border-radius:3px;height:4px;margin-top:4px;overflow:hidden"><div style="background:var(--accent);height:100%;width:${vitPct}%;border-radius:3px"></div></div><span style="margin-top:3px;display:block">${vitPct}% triaged</span></div></div>

  const triageQueue=`
  <div class="card mb-4">
    <div class="card-header">
      <h3><i class="fa-solid fa-clipboard-list fa-fw" style="color:var(--primary)"></i> Today's Triage Queue</h3>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="badge badge-blue">${s.encounters_today} total</span>
        ${s.vitals_pending>0?`<span class="badge badge-warn"><i class="fa-solid fa-heart-pulse"></i> ${s.vitals_pending} pending</span><button class="btn btn-accent btn-sm" onclick="startBatchTriage()"><i class="fa-solid fa-bolt"></i> Batch Triage</button>`:`<span class="badge badge-green"><i class="fa-solid fa-circle-check"></i> All triaged</span>`}
      </div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Patient</th><th>Age/Sex</th><th>Type</th><th>Complaint</th><th>Clinician</th><th>Vitals</th><th>Allergy</th><th></th></tr></thead>
      <tbody>${d.todays_queue.length===0?`<tr><td colspan="8"><div class="empty-state"><i class="fa-solid fa-circle-check" style="font-size:28px;color:var(--accent);display:block;margin-bottom:8px"></i><p>No encounters today yet</p></div></td></tr>`:d.todays_queue.map(e=>`
        <tr style="cursor:pointer" onclick="viewPatient(${e.patient_id})">
          <td><div style="display:flex;align-items:center;gap:8px"><div class="user-avatar" style="width:28px;height:28px;font-size:10px;background:${e.has_allergy?'#fecaca':'var(--primary-ghost)'};color:${e.has_allergy?'var(--danger)':'var(--primary)'}">${initials(e.patient_name)}</div><div><div class="patient-name">${e.patient_name}</div><div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">${e.smart_id}</div></div></div></td>
          <td style="font-size:12px">${e.age}y ${e.gender==='Male'?'M':'F'}</td>
          <td>${encTypeBadge(e.encounter_type)}</td>
          <td style="font-size:12px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.chief_complaint||'—'}</td>
          <td style="font-size:12px">${e.clinician_name}</td>
          <td>${e.has_vitals?`<span class="badge badge-green"><i class="fa-solid fa-check"></i> ${e.vitals_summary}</span>`:`<span class="badge badge-warn"><i class="fa-solid fa-clock"></i> Pending</span>`}</td>
          <td>${e.has_allergy?`<span class="badge badge-red"><i class="fa-solid fa-triangle-exclamation"></i> ${e.allergies.length>14?e.allergies.slice(0,14)+'…':e.allergies}</span>`:`<span class="badge badge-gray">None</span>`}</td>
          <td onclick="event.stopPropagation()"><button class="btn btn-outline btn-sm" onclick="showQuickVitalsModal(${e.encounter_id},'${e.patient_name.replace(/'/g,"\\'")}')"><i class="fa-solid fa-heart-pulse"></i></button></td>
        </tr>`).join('')}
      </tbody></table></div>
  </div>`;
  const followups=`
  <div class="grid-2 mb-4">
    <div class="card">
      <div class="card-header"><h3><i class="fa-solid fa-calendar-check fa-fw" style="color:var(--accent)"></i> Follow-ups This Week</h3><span class="badge badge-blue">${s.upcoming_followups}</span></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Patient</th><th>Type</th><th>Due</th><th>Clinician</th></tr></thead>
        <tbody>${d.upcoming_followups.length===0?`<tr><td colspan="4"><div class="empty-state"><p>No follow-ups this week</p></div></td></tr>`:d.upcoming_followups.map(f=>`
          <tr style="cursor:pointer" onclick="viewPatient(${f.patient_id})">
            <td><div class="patient-name">${f.patient_name}</div><div style="font-size:11px;color:var(--text3)">${f.last_diagnosis?f.last_diagnosis.slice(0,30):'—'}</div></td>
            <td>${encTypeBadge(f.encounter_type)}</td>
            <td>${f.days_away===0?'<span class="badge badge-warn">Today</span>':f.days_away===1?'<span class="badge badge-warn">Tomorrow</span>':fmtDate(f.follow_up_date)}</td>
            <td style="font-size:12px">${f.clinician_name}</td>
          </tr>`).join('')}
        </tbody></table></div>
    </div>
    <div class="card ${s.overdue_followups>0?'card--danger-border':''}">
      <div class="card-header"><h3><i class="fa-solid fa-clock-rotate-left fa-fw" style="color:var(--danger)"></i> Overdue Follow-ups</h3>${s.overdue_followups>0?`<span class="badge badge-red">${s.overdue_followups} overdue</span>`:`<span class="badge badge-green">All clear</span>`}</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Patient</th><th>Type</th><th>Was Due</th><th>Days Late</th></tr></thead>
        <tbody>${d.overdue_followups.length===0?`<tr><td colspan="4"><div class="empty-state"><i class="fa-solid fa-circle-check" style="color:var(--accent)"></i><p>No overdue follow-ups</p></div></td></tr>`:d.overdue_followups.map(f=>`
          <tr style="cursor:pointer" onclick="viewPatient(${f.patient_id})">
            <td><div class="patient-name">${f.patient_name}</div><div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">${f.smart_id}</div></td>
            <td>${encTypeBadge(f.encounter_type)}</td>
            <td style="font-size:12px;color:var(--danger)">${fmtDate(f.follow_up_date)}</td>
            <td><span class="badge badge-red">${f.days_overdue}d</span></td>
          </tr>`).join('')}
        </tbody></table></div>
    </div>
  </div>`;
  const bottom=`
  <div class="grid-2 mb-4">
    <div class="card ${s.allergy_count>0?'card--warn-border':''}">
      <div class="card-header"><h3><i class="fa-solid fa-shield-virus fa-fw" style="color:var(--warn)"></i> Allergy Alert Register</h3><span class="badge badge-warn">${s.allergy_count} patient${s.allergy_count!==1?'s':''}</span></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Patient</th><th>SmartID</th><th>Known Allergies</th><th>Blood Group</th></tr></thead>
        <tbody>${d.allergy_patients.length===0?`<tr><td colspan="4"><div class="empty-state"><p>No allergy records</p></div></td></tr>`:d.allergy_patients.map(p=>`
          <tr style="cursor:pointer" onclick="viewPatient(${p.patient_id})">
            <td class="patient-name">${p.patient_name}</td>
            <td><span class="tag">${p.smart_id}</span></td>
            <td><span class="badge badge-warn"><i class="fa-solid fa-triangle-exclamation"></i> ${p.allergies}</span></td>
            <td style="font-size:12px">${p.blood_group||'Unknown'}</td>
          </tr>`).join('')}
        </tbody></table></div>
    </div>
    <div class="card">
      <div class="card-header"><h3><i class="fa-solid fa-chart-pie fa-fw" style="color:var(--primary)"></i> Encounter Types</h3></div>
      <div class="card-body">${d.enc_types.length===0?`<div class="empty-state"><p>No data yet</p></div>`:`<div class="bar-chart">${d.enc_types.map(e=>`<div class="bar-row"><div class="bar-label">${e.encounter_type}</div><div class="bar-track"><div class="bar-fill accent" style="width:${Math.round((e.cnt/maxType)*100)}%"></div></div><div class="bar-val">${e.cnt}</div></div>`).join('')}</div>`}</div>
    </div>
  </div>`;
  document.getElementById('page-content').innerHTML = header+stats+triageQueue+followups+bottom;
}

function showQuickVitalsModal(encId, patientName) {
  openModal(`Record Vitals — ${patientName}`, `
  <p style="font-size:13px;color:var(--text2);margin-bottom:16px"><i class="fa-solid fa-circle-info" style="color:var(--primary)"></i> Only filled fields will be saved.</p>
  <div class="form-grid cols-3">
    <div class="field"><label><i class="fa-solid fa-thermometer-half" style="color:var(--danger)"></i> Temperature (°C)</label><input id="qv-temp" type="number" step="0.1" placeholder="37.0" inputmode="decimal"></div>
    <div class="field"><label><i class="fa-solid fa-heart" style="color:var(--danger)"></i> Pulse (bpm)</label><input id="qv-pulse" type="number" placeholder="80" inputmode="numeric"></div>
    <div class="field"><label><i class="fa-solid fa-gauge" style="color:var(--primary)"></i> Blood Pressure</label><input id="qv-bp" placeholder="120/80"></div>
    <div class="field"><label><i class="fa-solid fa-weight-scale" style="color:var(--accent)"></i> Weight (kg)</label><input id="qv-weight" type="number" step="0.1" placeholder="65" inputmode="decimal"></div>
    <div class="field"><label><i class="fa-solid fa-ruler-vertical" style="color:var(--accent)"></i> Height (cm)</label><input id="qv-height" type="number" placeholder="165" inputmode="numeric"></div>
    <div class="field"><label><i class="fa-solid fa-lungs" style="color:var(--primary)"></i> SpO₂ (%)</label><input id="qv-spo2" type="number" placeholder="98" inputmode="numeric"></div>
  </div>`,
  `<button class="btn btn-outline" onclick="closeModal()"><i class="fa-solid fa-xmark"></i> Cancel</button>
   <button class="btn btn-accent" onclick="submitQuickVitals(${encId})"><i class="fa-solid fa-floppy-disk"></i> Save Vitals</button>`);
}

async function submitQuickVitals(encId) {
  const payload={temperature:document.getElementById('qv-temp').value||null,pulse:document.getElementById('qv-pulse').value||null,blood_pressure:document.getElementById('qv-bp').value||null,weight:document.getElementById('qv-weight').value||null,height:document.getElementById('qv-height').value||null,oxygen_sat:document.getElementById('qv-spo2').value||null};
  if (!Object.values(payload).some(v=>v!==null&&v!=='')) { toast('Enter at least one vital sign','error'); return; }
  const res = await api(`/api/encounters/${encId}/vitals`,{method:'PATCH',body:JSON.stringify(payload)});
  if (res&&res.success) { closeModal(); toast('Vitals saved','success'); navigate('dashboard'); }
  else { toast('Failed to save vitals','error'); }
}

function showVitalsSearchModal() {
  openModal('Record Vitals — Find Patient', `
  <p style="margin-bottom:14px;color:var(--text2);font-size:13px">Search for the patient to triage:</p>
  <div class="search-bar" style="max-width:100%;margin-bottom:14px"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="vit-search" placeholder="Patient name or SmartID…" oninput="searchForVitals(this.value)" autocomplete="off"></div>
  <div id="vit-search-results"></div>`,
  `<button class="btn btn-outline" onclick="closeModal()"><i class="fa-solid fa-xmark"></i> Cancel</button>`);
  setTimeout(()=>document.getElementById('vit-search')?.focus(),100);
}

async function searchForVitals(q) {
  if (q.length<2) { document.getElementById('vit-search-results').innerHTML=''; return; }
  const patients = await api(`/api/patients?q=${encodeURIComponent(q)}`);
  const el = document.getElementById('vit-search-results');
  if (!el) return;
  if (!patients||!patients.length) { el.innerHTML='<p style="font-size:13px;color:var(--text3)">No patients found</p>'; return; }
  el.innerHTML = patients.slice(0,6).map(p=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:10px">
      <div><div style="font-weight:500;font-size:13px">${p.first_name} ${p.last_name}</div><div style="font-size:11px;color:var(--text3)">${p.smart_id} · ${age(p.date_of_birth)} yrs</div>${p.allergies&&p.allergies!=='None'?`<span class="badge badge-warn" style="margin-top:4px;font-size:10px"><i class="fa-solid fa-triangle-exclamation"></i> ${p.allergies}</span>`:''}</div>
      <button class="btn btn-accent btn-sm" onclick="startVitalsForPatient(${p.id},'${(p.first_name+' '+p.last_name).replace(/'/g,"\\'")}')"><i class="fa-solid fa-heart-pulse"></i> Triage</button>
    </div>`).join('');
}

async function startVitalsForPatient(patientId, patientName) {
  const today = new Date().toISOString().slice(0,10);
  const res = await api('/api/encounters',{method:'POST',body:JSON.stringify({patient:patientId,encounter_type:'OPD',visit_date:today,chief_complaint:'Triage',facility:currentUser.facility})});
  if (res&&res.success) {
    const d = await api('/api/dashboard');
    if (!d) return;
    const entry = d.todays_queue&&d.todays_queue.find(e=>e.patient_id===patientId&&!e.has_vitals);
    if (entry) { closeModal(); showQuickVitalsModal(entry.encounter_id,patientName); }
    else { closeModal(); toast('Encounter created — find patient in queue','success'); navigate('dashboard'); }
  } else { toast('Could not create triage encounter','error'); }
}

function startBatchTriage() {
  _batchQueue = (_lastNurseData&&_lastNurseData.todays_queue||[]).filter(e=>!e.has_vitals);
  _batchIdx = 0;
  if (!_batchQueue.length) { toast('No patients with pending vitals','success'); return; }
  _openBatchModal();
}

function _openBatchModal() {
  if (_batchIdx>=_batchQueue.length) { toast(`All ${_batchQueue.length} patients triaged`,'success'); navigate('dashboard'); return; }
  const p=_batchQueue[_batchIdx];
  openModal(`Batch Triage ${_batchIdx+1}/${_batchQueue.length} — ${p.patient_name}`,`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 14px;background:var(--accent-light);border-radius:var(--radius-sm)">
    <i class="fa-solid fa-user-nurse" style="color:var(--accent)"></i>
    <div><div style="font-weight:600">${p.patient_name}</div><div style="font-size:12px;color:var(--text3)">${p.smart_id} · ${p.age} yrs · ${p.gender}${p.has_allergy?` · <span style="color:var(--danger);font-weight:600">⚠ ${p.allergies}</span>`:''}</div></div>
    <div style="margin-left:auto;font-size:12px;color:var(--text3)">${_batchQueue.length-_batchIdx-1} after this</div>
  </div>
  <div class="form-grid cols-3">
    <div class="field"><label>Temp °C</label><input id="bt-temp" type="number" step="0.1" placeholder="37.0" inputmode="decimal"></div>
    <div class="field"><label>Pulse bpm</label><input id="bt-pulse" type="number" placeholder="80" inputmode="numeric"></div>
    <div class="field"><label>Blood Pressure</label><input id="bt-bp" placeholder="120/80"></div>
    <div class="field"><label>Weight kg</label><input id="bt-weight" type="number" step="0.1" placeholder="65" inputmode="decimal"></div>
    <div class="field"><label>Height cm</label><input id="bt-height" type="number" placeholder="165" inputmode="numeric"></div>
    <div class="field"><label>SpO₂ %</label><input id="bt-spo2" type="number" placeholder="98" inputmode="numeric"></div>
  </div>`,
  `<button class="btn btn-outline" onclick="closeModal()"><i class="fa-solid fa-xmark"></i> Exit</button>
   <button class="btn btn-outline btn-sm" onclick="_skipBatch()"><i class="fa-solid fa-forward-step"></i> Skip</button>
   <button class="btn btn-accent" onclick="_saveBatch(${p.encounter_id})"><i class="fa-solid fa-floppy-disk"></i> Save &amp; Next</button>`);
  setTimeout(()=>document.getElementById('bt-temp')?.focus(),100);
}

async function _saveBatch(encId) {
  const payload={temperature:document.getElementById('bt-temp').value||null,pulse:document.getElementById('bt-pulse').value||null,blood_pressure:document.getElementById('bt-bp').value||null,weight:document.getElementById('bt-weight').value||null,height:document.getElementById('bt-height').value||null,oxygen_sat:document.getElementById('bt-spo2').value||null};
  if (!Object.values(payload).some(v=>v!==null&&v!=='')) { toast('Enter at least one vital','error'); return; }
  const res = await api(`/api/encounters/${encId}/vitals`,{method:'PATCH',body:JSON.stringify(payload)});
  if (res&&res.success) toast(`✓ Saved for ${_batchQueue[_batchIdx].patient_name}`,'success');
  _batchIdx++; _openBatchModal();
}
function _skipBatch() { _batchIdx++; _openBatchModal(); }
</script>

<script>
/* ═══════════════ ADMIN DASHBOARD ═══════════════ */

    <div class="stat-card accent"><div class="label"><i class="fa-solid fa-stethoscope fa-fw"></i> Total Encounters</div><div class="value">${s.total_encounters}</div><div class="sub">All clinical visits</div></div>
    <div class="stat-card warn"><div class="label"><i class="fa-solid fa-calendar-days fa-fw"></i> This Month</div><div class="value">${s.monthly_encounters}</div><div class="sub">Encounters recorded</div></div>
    <div class="stat-card danger"><div class="label"><i class="fa-solid fa-clock fa-fw"></i> Today</div><div class="value">${s.today_encounters}</div><div class="sub">${s.total_users} system users</div></div>
