<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCare EMR — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #0f4c81;
      --primary-light: #1a69b3;
      --accent:        #00a878;
      --danger:        #dc2626;
      --text:          #0f172a;
      --text2:         #475569;
      --text3:         #94a3b8;
      --border:        #e2e8f0;
      --border2:       #cbd5e1;
      --radius:        10px;
      --radius-sm:     6px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
    }

    /* ── Page background ── */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(150deg, #0f4c81 0%, #1a69b3 45%, #00a878 100%);
      padding: 16px;
      padding-top: max(16px, env(safe-area-inset-top, 16px));
      padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
    }

    /* ── Card ── */
    .login-card {
      background: #fff;
      border-radius: 18px;
      padding: 40px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, .28);
    }

    /* ── Logo block ── */
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .icon {
      font-size: 40px;
      color: var(--primary);
      display: block;
      margin-bottom: 10px;
    }
    .login-logo h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: -.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-logo p {
      font-size: 12px;
      color: var(--text3);
      margin-top: 5px;
    }

    /* ── Form fields ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .field label i {
      width: 14px;
      color: var(--text3);
    }
    .field input {
      padding: 11px 14px;
      border: 1.5px solid var(--border2);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
    }
    .field input:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(26, 105, 179, .12);
    }

    /* ── Sign-in button ── */
    .btn-signin {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .15s, transform .1s;
      letter-spacing: .1px;
    }
    .btn-signin:hover  { background: var(--primary-light); }
    .btn-signin:active { transform: scale(.98); }
    .btn-signin:disabled { opacity: .65; cursor: not-allowed; transform: none; }

    /* ── Error message ── */
    #l-err {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: var(--radius-sm);
      color: var(--danger);
      font-size: 12.5px;
      line-height: 1.5;
      text-align: center;
    }

    /* ── Footer note ── */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--text3);
      line-height: 1.6;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .login-card {
        padding: 28px 22px;
        border-radius: 14px;
      }
      .login-logo .icon { font-size: 34px; }
      .login-logo h1   { font-size: 19px; }
    }
  </style>
</head>
<body>

  <div class="login-card">

    <div class="login-logo">
      <span class="icon"><i class="fa-solid fa-hospital-user"></i></span>
      <h1><i class="fa-solid fa-heart-pulse"></i> SmartCare EMR</h1>
      <p>Ministry of Health &middot; Republic of Zambia</p>
    </div>

    <form id="login-form" onsubmit="return false;">

      <div class="field">
        <label for="l-user"><i class="fa-solid fa-user"></i> Username</label>
        <input
          type="text"
          id="l-user"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          inputmode="text"
          required
        >
      </div>

      <div class="field">
        <label for="l-pass"><i class="fa-solid fa-lock"></i> Password</label>
        <input
          type="password"
          id="l-pass"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn-signin" id="signin-btn">
        <i class="fa-solid fa-sign-in-alt"></i> Sign In
      </button>

    </form>

    <div id="l-err" role="alert" aria-live="polite"></div>

    <div class="login-footer">
      SmartCare EMR &copy; 2025 &middot; Secure Clinical System<br>
      Authorised users only
    </div>

  </div>

  <script src="/static/js/auth.js"></script>

</body>
</html>
