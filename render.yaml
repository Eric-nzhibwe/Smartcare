databases:
  - name: smartcare-db
    databaseName: smartcare
    user: smartcare_user
    plan: free
    region: oregon

services:
  - type: web
    name: smartcare-emr
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: bash build.sh
    startCommand: gunicorn smartemr.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://smartcare-emr.onrender.com"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "superadmin"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@smartcare.zm"
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smartcare-db
          property: connectionString
